<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <style>
    .bg{fill:#06121a}
    .window{fill:#07111a; stroke:#0f1724; stroke-opacity:0.5}
    .title{font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; fill:#e6eef6; font-size:13px}
    .mono{font-family: Menlo, Monaco, 'SF Mono', monospace; fill:#dbeafe; font-size:15px}
    .muted{fill:#94a3b8}
    .green{fill:#10b981}
    .json-key{fill:#60a5fa}
    .json-str{fill:#fca5a5}
  </style>
  <rect width="100%" height="100%" class="bg"/>
  <g transform="translate(120,80)">
    <rect width="1680" height="880" rx="12" class="window"/>
    <circle cx="20" cy="20" r="8" fill="#ff5f56"/>
    <circle cx="44" cy="20" r="8" fill="#ffbd2e"/>
    <circle cx="68" cy="20" r="8" fill="#27c93f"/>
    <text x="120" y="28" class="title">Postman Mock — GET /users</text>

    <!-- Request -->
    <g transform="translate(40,70)">
      <rect width="1600" height="200" rx="8" fill="#041124"/>
      <rect x="24" y="24" width="72" height="32" rx="6" fill="#16a34a"/>
      <text x="60" y="46" text-anchor="middle" class="mono">GET</text>
      <text x="120" y="46" class="mono">http://localhost:3000/users</text>
      <text x="24" y="88" class="muted mono">Headers: none</text>
    </g>

    <!-- Response -->
    <g transform="translate(40,290)">
      <rect width="1600" height="560" rx="8" fill="#041124"/>
      <rect x="24" y="24" width="220" height="34" rx="6" fill="#059669"/>
      <text x="135" y="46" text-anchor="middle" class="mono">200 OK</text>

      <g transform="translate(40,88)">
        <text class="mono">[</text>
        <text class="mono" x="20" y="34"><tspan class="json-key">  {</tspan></text>
        <text class="mono" x="40" y="68"><tspan class="json-key">    "id":</tspan> <tspan class="json-num">1,</tspan></text>
        <text class="mono" x="40" y="102"><tspan class="json-key">    "name":</tspan> <tspan class="json-str">"Indranil Dahivele",</tspan></text>
        <text class="mono" x="40" y="136"><tspan class="json-key">    "email":</tspan> <tspan class="json-str">"indranildahivlele63@gmail.com"</tspan></text>
        <text class="mono" x="20" y="170">  },</text>

        <text class="mono" x="20" y="204"><tspan class="json-key">  {</tspan></text>
        <text class="mono" x="40" y="238"><tspan class="json-key">    "id":</tspan> <tspan class="json-num">2,</tspan></text>
        <text class="mono" x="40" y="272"><tspan class="json-key">    "name":</tspan> <tspan class="json-str">"Rohan Tarange",</tspan></text>
        <text class="mono" x="40" y="306"><tspan class="json-key">    "email":</tspan> <tspan class="json-str">"rohantarange@gmail.com"</tspan></text>
        <text class="mono" x="20" y="340">  }</text>
        <text class="mono" x="0" y="380">]</text>
      </g>
    </g>
  </g>
</svg>