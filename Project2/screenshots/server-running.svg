<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <style>
      .mono{font-family: Menlo, Monaco, 'SF Mono', monospace; fill:#cbd5e1; font-size:16px}
      .title{font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; fill:#e6eef6; font-size:13px}
      .term{fill:#dbeafe}
      .muted{fill:#94a3b8}
      .accent{fill:#60a5fa}
      .green{fill:#34d399}
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" rx="0"/>

  <!-- macOS window chrome -->
  <g transform="translate(120,80)">
    <rect width="1680" height="880" rx="12" fill="#0b1116" stroke="#111827" stroke-opacity="0.4"/>
    <!-- traffic lights -->
    <circle cx="20" cy="20" r="8" fill="#ff5f56"/>
    <circle cx="44" cy="20" r="8" fill="#ffbd2e"/>
    <circle cx="68" cy="20" r="8" fill="#27c93f"/>
    <text x="120" y="28" class="title">Terminal — bash</text>

    <!-- Terminal content area -->
    <rect x="30" y="56" width="1620" height="780" rx="8" fill="#0b1320"/>
    <g transform="translate(60,96)">
      <text class="mono" x="0" y="0">$ npm run dev</text>
      <text class="mono muted" x="0" y="36">> project2@1.0.0 dev</text>
      <text class="mono muted" x="0" y="64">> nodemon server.js</text>
      <text class="mono" x="0" y="120">[nodemon] 3.1.14</text>
      <text class="mono" x="0" y="152">[nodemon] starting `node server.js`</text>
      <text class="mono green" x="0" y="200">Server running on http://localhost:3000</text>

      <!-- faint prompt lines to fill area -->
      <text class="mono muted" x="0" y="260">Press Cmd+C to stop the server</text>
    </g>
  </g>
</svg>