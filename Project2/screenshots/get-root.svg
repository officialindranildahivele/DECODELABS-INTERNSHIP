<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <style>
    .bg{fill:#0b0f14}
    .window{fill:#0b1116; stroke:#111827; stroke-opacity:0.4}
    .title{font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; fill:#e6eef6; font-size:13px}
    .mono{font-family: Menlo, Monaco, 'SF Mono', monospace; fill:#cbd5e1; font-size:15px}
    .muted{fill:#94a3b8}
    .green{fill:#22c55e}
    .badge{font-family: Menlo, monospace; font-size:13px; font-weight:700}
    .json-key{fill:#93c5fd}
    .json-str{fill:#fca5a5}
    .json-num{fill:#fbbf24}
  </style>
  <rect width="100%" height="100%" class="bg"/>

  <g transform="translate(120,80)">
    <rect width="1680" height="880" rx="12" class="window"/>
    <circle cx="20" cy="20" r="8" fill="#ff5f56"/>
    <circle cx="44" cy="20" r="8" fill="#ffbd2e"/>
    <circle cx="68" cy="20" r="8" fill="#27c93f"/>
    <text x="120" y="28" class="title">Postman Mock — GET /</text>

    <!-- Request area -->
    <g transform="translate(40,70)">
      <rect width="1600" height="220" rx="8" fill="#071122"/>
      <!-- method badge -->
      <rect x="24" y="24" width="72" height="32" rx="6" fill="#22c55e"/>
      <text x="60" y="46" text-anchor="middle" class="badge">GET</text>
      <text x="120" y="46" class="mono">http://localhost:3000/</text>
      <text x="24" y="88" class="muted mono">Headers: none</text>
    </g>

    <!-- Response area -->
    <g transform="translate(40,320)">
      <rect width="1600" height="470" rx="8" fill="#071122"/>
      <rect x="24" y="24" width="220" height="34" rx="6" fill="#10b981"/>
      <text x="135" y="46" text-anchor="middle" class="badge">200 OK</text>

      <!-- JSON pretty -->
      <g transform="translate(40,90)">
        <text class="mono"><tspan class="json-key">{</tspan></text>
        <text class="mono" x="20" y="34"><tspan class="json-key">  "message":</tspan> <tspan class="json-str"> "Backend API Running"</tspan></text>
        <text class="mono" x="0" y="68">}</text>
      </g>
    </g>
  </g>
</svg>