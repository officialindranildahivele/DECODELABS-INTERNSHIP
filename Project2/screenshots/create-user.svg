<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <style>
    .bg{fill:#06121a}
    .window{fill:#07111a; stroke:#0f1724; stroke-opacity:0.5}
    .title{font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; fill:#e6eef6; font-size:13px}
    .mono{font-family: Menlo, Monaco, 'SF Mono', monospace; fill:#dbeafe; font-size:15px}
    .muted{fill:#94a3b8}
    .orange{fill:#fb923c}
    .json-key{fill:#60a5fa}
    .json-str{fill:#fca5a5}
  </style>
  <rect width="100%" height="100%" class="bg"/>
  <g transform="translate(120,80)">
    <rect width="1680" height="880" rx="12" class="window"/>
    <circle cx="20" cy="20" r="8" fill="#ff5f56"/>
    <circle cx="44" cy="20" r="8" fill="#ffbd2e"/>
    <circle cx="68" cy="20" r="8" fill="#27c93f"/>
    <text x="120" y="28" class="title">Postman Mock — POST /users</text>

    <!-- Request -->
    <g transform="translate(40,70)">
      <rect width="1600" height="260" rx="8" fill="#041124"/>
      <rect x="24" y="24" width="92" height="32" rx="6" fill="#fb923c"/>
      <text x="70" y="46" text-anchor="middle" class="mono">POST</text>
      <text x="140" y="46" class="mono">http://localhost:3000/users</text>
      <text x="24" y="88" class="muted mono">Headers: Content-Type: application/json</text>

      <!-- body -->
      <g transform="translate(24,120)">
        <rect width="1520" height="100" rx="6" fill="#081425"/>
        <text class="mono" x="16" y="28">{</text>
        <text class="mono" x="36" y="56"><tspan class="json-key">  "name":</tspan> <tspan class="json-str">"Charlie Brown",</tspan></text>
        <text class="mono" x="36" y="84"><tspan class="json-key">  "email":</tspan> <tspan class="json-str">"charlie@example.com"</tspan></text>
        <text class="mono" x="16" y="112">}</text>
      </g>
    </g>

    <!-- Response -->
    <g transform="translate(40,360)">
      <rect width="1600" height="470" rx="8" fill="#041124"/>
      <rect x="24" y="24" width="260" height="34" rx="6" fill="#f97316"/>
      <text x="154" y="46" text-anchor="middle" class="mono">201 Created</text>

      <g transform="translate(40,100)">
        <text class="mono">{</text>
        <text class="mono" x="20" y="34"><tspan class="json-key">  "message":</tspan> <tspan class="json-str">"User Created",</tspan></text>
        <text class="mono" x="20" y="68"><tspan class="json-key">  "user":</tspan> <tspan class="json-key">{</tspan></text>
        <text class="mono" x="40" y="102"><tspan class="json-key">    "id":</tspan> <tspan class="json-str">3,</tspan></text>
        <text class="mono" x="40" y="136"><tspan class="json-key">    "name":</tspan> <tspan class="json-str">"Charlie Brown",</tspan></text>
        <text class="mono" x="40" y="170"><tspan class="json-key">    "email":</tspan> <tspan class="json-str">"charlie@example.com"</tspan></text>
        <text class="mono" x="20" y="204">  }</text>
        <text class="mono" x="0" y="240">}</text>
      </g>
    </g>
  </g>
</svg>